<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="app.js" defer></script>
    <title>Memory Cards</title>
</head>

<body>

                <div class="square" id="1"><img class="animals" src="images/bee.png"></div>
                <div class="square" id="2"><img class="animals" src="images/bee.png"></div>

                <div class="square" id="11"><img class="animals" src="images/bee.png"></div>
            </div>
            <div class="board-rows">
                <div class="square" id="12"><img class="animals" src="images/bee.png"></div>
                <div class="square" id="13"><img class="animals" src="images/bee.png"></div>
                <div class="square" id="14"><img class="animals" src="images/bee.png"></div>
                <div class="square" id="15"><img class="animals" src="images/bee.png"></div>
            </div>
        </div>
        <div class="score">
            <h4>Your Score:</h4>
        </div>
    </div>
</body>

</html>
